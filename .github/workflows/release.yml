name: Release

on:
  push:
    tags:
      - 'v*'

# REQUIRED — without this GitHub Actions cannot create releases
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Build fat JAR
        run: mvn clean package -DskipTests

      - name: Rename JAR for release
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mv target/tui-*.jar target/spring-tui-${VERSION}.jar
          echo "JAR_NAME=spring-tui-${VERSION}.jar" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          name: Spring TUI ${{ github.ref_name }}
          body: |
            ## Spring TUI ${{ github.ref_name }}

            ### Download
            Download `spring-tui-${{ github.ref_name }}.jar` below.

            ### Run
            ```bash
            java -jar spring-tui-${{ github.ref_name }}.jar
            ```

            ### Requirements
            - Java 21+
            - Internet connection (fetches metadata from start.spring.io)
          files: target/${{ env.JAR_NAME }}
          draft: false
          prerelease: false