name: Release

# triggers when you push a version tag
# git tag v1.0.0 && git push --tags
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build fat JAR
        run: mvn clean package -DskipTests

      - name: Rename JAR for release
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mv target/tui-*.jar target/spring-tui-${VERSION}.jar
          echo "JAR_NAME=spring-tui-${VERSION}.jar" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Spring TUI ${{ github.ref_name }}
          body: |
            ## Spring TUI ${{ github.ref_name }}

            ### Download
            Download `spring-tui-${{ github.ref_name }}.jar` below.

            ### Run
            ```bash
            java -jar spring-tui-${{ github.ref_name }}.jar
            ```

            ### Requirements
            - Java 21+
            - Internet connection (fetches metadata from start.spring.io)

            ### What's new
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          files: target/${{ env.JAR_NAME }}
          draft: false
          prerelease: false